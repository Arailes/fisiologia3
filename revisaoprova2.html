<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoCARD Med: Fisiologia III IDOMED</title>
    <style>
        :root {
            --primary-dark: #003b6f;
            --primary-color: #005b96;
            --primary-light: #6497b1;
            --accent-color: #b3cde0;
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-color: #333;
            --text-light: #666;
            --success-color: #2e7d32;
            --warning-color: #ef6c00;
            --danger-color: #c62828;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- HEADER --- */
        header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
            max-width: 800px;
            animation: fadeIn 0.8s ease;
        }

        h1 {
            color: var(--primary-dark);
            font-size: 2.2rem;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-light);
            font-size: 1.1rem;
        }

        /* --- GRID PRINCIPAL (Módulos) --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            width: 100%;
            padding-bottom: 40px;
        }

        .module-card {
            background-color: var(--card-bg);
            border-radius: var(--radius);
            padding: 30px;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border-top: 6px solid var(--primary-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .module-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .module-card::after {
            content: '→';
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 1.5rem;
            color: var(--primary-light);
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
        }

        .module-card:hover::after {
            opacity: 1;
            transform: translateX(5px);
        }

        .module-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 12px;
        }

        .module-desc {
            font-size: 0.95rem;
            color: var(--text-light);
            line-height: 1.5;
            margin-bottom: 20px;
        }

        /* --- BOTÕES --- */
        .btn {
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }
        .btn-primary:hover { background-color: var(--primary-dark); }

        .btn-special {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white;
            width: 100%;
            text-align: center;
            margin-top: 15px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0, 91, 150, 0.3);
        }
        .btn-special:hover { transform: scale(1.02); }

        /* --- MODAL SYSTEM --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        /* Z-Index para empilhamento de modais */
        #modalModule { z-index: 1000; }
        #modalHormoneDashboard { z-index: 2000; }
        #modalHormoneDetail { z-index: 3000; }

        .modal-content {
            background-color: white;
            width: 95%;
            max-width: 900px;
            height: 90vh;
            border-radius: var(--radius);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.show .modal-content {
            transform: scale(1);
        }

        .modal-header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .modal-title { font-size: 1.2rem; font-weight: bold; }

        .close-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: background 0.2s;
        }
        .close-btn:hover { background: rgba(255,255,255,0.4); }

        .modal-body {
            padding: 25px;
            overflow-y: auto;
            background-color: #f9f9f9;
            flex-grow: 1;
            -webkit-overflow-scrolling: touch;
        }

        /* --- ACORDEÃO (Dentro do Módulo) --- */
        .accordion-item {
            margin-bottom: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            overflow: hidden;
        }

        .accordion-header {
            width: 100%;
            background-color: white;
            padding: 18px 20px;
            text-align: left;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--primary-dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .accordion-header:hover { background-color: var(--bg-color); }
        .accordion-header.active { background-color: #e3f2fd; color: var(--primary-color); border-bottom: 1px solid #e0e0e0; }

        .accordion-content {
            padding: 0 20px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background-color: white;
        }
        .accordion-content.open { padding: 20px; }

        /* --- GRID DOS 12 HORMÔNIOS (Dashboard) --- */
        .hormone-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        .hormone-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid var(--primary-light);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hormone-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-left-color: var(--primary-color);
        }

        .hormone-name { font-weight: 700; color: var(--text-color); }

        /* --- DETALHES DE CONTEÚDO --- */
        .content-text p { margin-bottom: 12px; line-height: 1.6; text-align: justify; }
        .content-text h3 { color: var(--primary-color); margin-top: 20px; margin-bottom: 10px; font-size: 1.1rem; border-left: 4px solid var(--accent-color); padding-left: 10px; }
        .content-text ul, .content-text ol { margin-left: 20px; margin-bottom: 15px; }
        .content-text li { margin-bottom: 6px; }

        /* Tags */
        .tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; margin-right: 5px; text-transform: uppercase; vertical-align: middle; }
        .tag-phy { background: #e8f5e9; color: var(--success-color); border: 1px solid #c8e6c9; }
        .tag-pat { background: #ffebee; color: var(--danger-color); border: 1px solid #ffcdd2; }
        .tag-cli { background: #fff3e0; color: var(--warning-color); border: 1px solid #ffe0b2; }

        /* Tabelas */
        .med-table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 0.9rem; }
        .med-table th, .med-table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .med-table th { background-color: var(--primary-color); color: white; }
        .med-table tr:nth-child(even) { background-color: #f8f9fa; }

        /* Responsividade */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .modal-content { width: 100%; height: 100%; border-radius: 0; }
            .hormone-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Fisiologia III</h1>
        <p class="subtitle">Plataforma de Estudo para Medicina IDOMED - Quixada-CE</p>
    </header>

    <div class="grid-container" id="mainGrid">
        </div>

    <div class="modal-overlay" id="modalModule">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title" id="moduleTitle">Título</span>
                <button class="close-btn" onclick="closeModal('modalModule')">&times;</button>
            </div>
            <div class="modal-body" id="moduleBody"></div>
        </div>
    </div>

    <div class="modal-overlay" id="modalHormoneDashboard">
        <div class="modal-content" style="max-width: 1000px;">
            <div class="modal-header" style="background-color: var(--primary-dark);">
                <span class="modal-title">Painel: 12 Hormônios Reguladores</span>
                <button class="close-btn" onclick="closeModal('modalHormoneDashboard')">&times;</button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 20px; color: #666;">Selecione um hormônio para ver detalhes clínicos e fisiológicos.</p>
                <div class="hormone-grid" id="hormoneGrid">
                    </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalHormoneDetail">
        <div class="modal-content" style="max-width: 600px; height: auto; max-height: 80vh;">
            <div class="modal-header" style="background-color: var(--primary-light);">
                <span class="modal-title" id="hormoneDetailTitle">Nome</span>
                <button class="close-btn" onclick="closeModal('modalHormoneDetail')">&times;</button>
            </div>
            <div class="modal-body" id="hormoneDetailBody">
                </div>
        </div>
    </div>

    <script>
        // --- DADOS: SCRIPT 1 (12 HORMÔNIOS) ---
        const hormonesData = [
            { id: 1, nome: "Gastrina", funcao: "Estimula células parietais (HCl) e crescimento da mucosa.", producao: "Células G (Antro/Duodeno)", estimulo: "Proteínas, distensão, vagotonia.", clinica: "<strong>Síndrome de Zollinger-Ellison:</strong> Hipercloridria extrema, úlceras múltiplas." },
            { id: 2, nome: "Secretina", funcao: "Estimula liberação de Bicarbonato pancreático (neutraliza ácido).", producao: "Células S (Duodeno)", estimulo: "pH ácido no duodeno.", clinica: "<strong>Deficiência:</strong> pH duodenal baixo, inativação enzimática e diarreia ácida." },
            { id: 3, nome: "CCK (Colecistocinina)", funcao: "Contração da vesícula, enzimas pancreáticas, inibe esvaziamento gástrico.", producao: "Células I (Duodeno/Jejuno)", estimulo: "Gorduras e Proteínas.", clinica: "Essencial para digestão lipídica." },
            { id: 4, nome: "Grelina", funcao: "Estimula o apetite (fome) e secreção de GH.", producao: "Fundo gástrico", estimulo: "Jejum (cai após refeição).", clinica: "Alvo em cirurgias bariátricas (retirada do fundo gástrico)." },
            { id: 5, nome: "Peptídeo YY (PYY)", funcao: "Induz saciedade e inibe motilidade (freio ileal).", producao: "Íleo e Cólon", estimulo: "Nutrientes no íleo.", clinica: "Aumenta muito após bariátrica (saciedade precoce)." },
            { id: 6, nome: "Motilina", funcao: "Coordena o Complexo Motor Migratório (limpeza em jejum).", producao: "Células M", estimulo: "Jejum (ciclos 90min).", clinica: "Agonistas da motilina (ex: eritromicina) tratam gastroparesia." },
            { id: 7, nome: "Somatostatina", funcao: "Inibidor Universal (Gastrina, Insulina, Enzimas).", producao: "Células D (Pâncreas/Estômago)", estimulo: "pH muito ácido.", clinica: "<strong>Somatostatinoma:</strong> Má digestão, diarreia, diabetes leve." },
            { id: 8, nome: "GIP", funcao: "Incretina: Estimula insulina dependente de glicose.", producao: "Células K", estimulo: "Glicose/Gordura oral.", clinica: "Explica por que glicose oral libera mais insulina que a venosa." },
            { id: 9, nome: "GLP-1", funcao: "Estimula insulina, inibe glucagon, saciedade.", producao: "Células L (Íleo)", estimulo: "Nutrientes.", clinica: "<strong>Análogos (Semaglutida):</strong> Tratamento de Diabetes e Obesidade." },
            { id: 10, nome: "Oximodulina", funcao: "Inibe esvaziamento gástrico, reduz apetite.", producao: "Células L", estimulo: "Alimentos.", clinica: "Regulação do peso corporal." },
            { id: 11, nome: "VIP", funcao: "Vasodilatação esplâncnica, relaxa musculatura lisa.", producao: "Neurônios entéricos", estimulo: "Atividade vagal.", clinica: "<strong>VIPoma:</strong> Diarreia aquosa, Hipocalemia, Acloridria (Síndrome WDHA)." },
            { id: 12, nome: "GRP", funcao: "Estimula liberação de gastrina.", producao: "Neurônios do antro", estimulo: "Vago.", clinica: "Mediador da fase cefálica da digestão." }
        ];

        // --- DADOS: SCRIPT 2 (CONTEÚDOS GERAIS) ---
        const modulesData = [
            {
                id: "renal_path",
                title: "Fisiologia Renal e Patologias",
                desc: "Equilíbrio Ácido-Básico, Síndromes Nefrítica/Nefrótica e Injúria Renal.",
                topics: [
                    {
                        title: "1. Equilíbrio Ácido-Básico",
                        content: `
                            <p><span class="tag tag-phy">Fisiologia</span> pH Normal: 7.35 - 7.45. Mantido por Pulmões (CO2) e Rins (HCO3).</p>
                            <table class="med-table">
                                <tr><th>Distúrbio</th><th>Alteração Primária</th><th>Compensação</th></tr>
                                <tr><td>Acidose Metabólica</td><td>↓ HCO3</td><td>Hiperventilação (↓ CO2)</td></tr>
                                <tr><td>Alcalose Metabólica</td><td>↑ HCO3</td><td>Hipoventilação (↑ CO2)</td></tr>
                                <tr><td>Acidose Respiratória</td><td>↑ CO2</td><td>Rim retém HCO3</td></tr>
                                <tr><td>Alcalose Respiratória</td><td>↓ CO2</td><td>Rim excreta HCO3</td></tr>
                            </table>`
                    },
                    {
                        title: "2. Síndrome Nefrítica vs Nefrótica",
                        content: `
                            <h3>Síndrome Nefrítica <span class="tag tag-pat">Inflamação</span></h3>
                            <p>Inflamação glomerular. Tríade: <strong>Hematúria, Hipertensão, Edema</strong>. Ex: Glomerulonefrite Pós-Estreptocócica. Urina com cilindros hemáticos.</p>
                            <h3>Síndrome Nefrótica <span class="tag tag-pat">Perda Proteica</span></h3>
                            <p>Lesão da barreira. Proteinúria maciça (>3.5g/dia). Hipoalbuminemia, Anasarca, Hiperlipidemia. Risco de trombose e infecção.</p>`
                    },
                    {
                        title: "3. Injúria Renal (Aguda e Crônica)",
                        content: `
                            <ul>
                                <li><strong>IRA:</strong> Perda rápida. Causas: Pré-renal (desidratação), Renal (NTA, drogas), Pós-renal (cálculo).</li>
                                <li><strong>IRC:</strong> Perda irreversível. Complicações: Anemia (falta EPO), Doença óssea (falta Vit D), Hipercalemia.</li>
                            </ul>`
                    }
                ]
            },
            {
                id: "digestive",
                title: "Sistema Digestivo",
                desc: "Controle Neural, Hormonal e Motilidade do TGI.",
                topics: [
                    {
                        title: "1. Regulação Neural",
                        content: `
                            <p><strong>S.N. Entérico:</strong> Plexo Submucoso (Secreção) e Mioentérico (Motilidade).</p>
                            <p><strong>S.N. Autônomo:</strong> Parassimpático (ACh) estimula. Simpático (NA) inibe.</p>`
                    },
                    {
                        title: "2. Defesa e Estrutura",
                        content: `
                            <p>GALT (Tecido Linfoide): Placas de Peyer, IgA secretória. Barreiras: Muco, Ácido, Defensinas.</p>`
                    },
                    {
                        title: "3. Regulação Hormonal (Painel Interativo)",
                        content: `
                            <div style="background-color: #e3f2fd; padding: 20px; border-radius: 8px; text-align: center; border: 1px dashed var(--primary-color);">
                                <h3 style="margin-top:0; border:none;">Reguladores do TGI</h3>
                                <p>O trato gastrointestinal é controlado por uma rede complexa de peptídeos.</p>
                                <button class="btn btn-special" onclick="openHormoneDashboard()">
                                    Acessar Painel dos 12 Hormônios
                                </button>
                            </div>`
                    }
                ]
            },
            {
                id: "repro",
                title: "Fisiologia Reprodutiva Masc.",
                desc: "Diferenciação, Eixo Hormonal e Espermatogênese.",
                topics: [
                    {
                        title: "1. Diferenciação Sexual",
                        content: `
                            <p>Gene SRY (Y) -> Testículos.</p>
                            <ul>
                                <li><strong>Sertoli Fetal:</strong> AMH (Degenera Müller/Útero).</li>
                                <li><strong>Leydig Fetal:</strong> Testosterona (Mantém Wolff/Ductos).</li>
                                <li><strong>DHT:</strong> Genitália Externa.</li>
                            </ul>`
                    },
                    {
                        title: "2. Eixo e Espermatogênese",
                        content: `
                            <p>GnRH pulsátil -> LH (Leydig->Testosterona) e FSH (Sertoli->Esperma).</p>
                            <p>Espermatogênese: ~64 dias. Mitose -> Meiose -> Espermiogênese (diferenciação).</p>`
                    }
                ]
            },
            {
                id: "renal_phys",
                title: "Mecanismos Renais",
                desc: "Filtração, Reabsorção e Secreção Tubular.",
                topics: [
                    {
                        title: "1. Filtração e Túbulo Proximal",
                        content: `
                            <p>Filtra 180L/dia. Barreira de podócitos.</p>
                            <p><strong>TCP:</strong> Reabsorve 100% Glicose/Aminoácidos e 80% H2O/Na. Local de secreção de ácidos e bases orgânicas.</p>`
                    },
                    {
                        title: "2. Alça de Henle e Distal",
                        content: `
                            <p><strong>Alça:</strong> Contracorrente. Descendente concentra (sai água). Ascendente dilui (sai sal, impermeável à água).</p>
                            <p><strong>Distal/Coletor:</strong> Ajuste fino. Aldosterona (reabsorve Na/excreta K). ADH (reabsorve água).</p>`
                    }
                ]
            }
        ];

        // --- LÓGICA JS ---

        // 1. Renderizar Grid Principal
        const mainGrid = document.getElementById('mainGrid');
        modulesData.forEach(mod => {
            const card = document.createElement('div');
            card.className = 'module-card';
            card.innerHTML = `
                <div>
                    <div class="module-title">${mod.title}</div>
                    <div class="module-desc">${mod.desc}</div>
                </div>
                <button class="btn btn-primary">Acessar Módulo</button>
            `;
            card.onclick = () => openModule(mod);
            mainGrid.appendChild(card);
        });

        // 2. Renderizar Grid de Hormônios (Preparação)
        const hormoneGrid = document.getElementById('hormoneGrid');
        hormonesData.forEach(h => {
            const card = document.createElement('div');
            card.className = 'hormone-card';
            card.innerHTML = `
                <span class="hormone-name">${h.nome}</span>
                <span style="color: var(--primary-light); font-weight:bold;">+</span>
            `;
            card.onclick = () => openHormoneDetail(h);
            hormoneGrid.appendChild(card);
        });

        // 3. Funções de Modal
        function openModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.classList.add('show');
            modal.style.display = 'flex';
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.classList.remove('show');
            setTimeout(() => {
                if(!modal.classList.contains('show')) modal.style.display = 'none';
            }, 300); // Espera animação
        }

        // Fechar ao clicar fora
        window.onclick = function(event) {
            if (event.target.classList.contains('modal-overlay')) {
                closeModal(event.target.id);
            }
        }

        // 4. Abrir Módulo
        function openModule(module) {
            document.getElementById('moduleTitle').innerText = module.title;
            const body = document.getElementById('moduleBody');
            body.innerHTML = '';

            module.topics.forEach(topic => {
                const item = document.createElement('div');
                item.className = 'accordion-item';
                
                const header = document.createElement('button');
                header.className = 'accordion-header';
                header.innerHTML = `${topic.title} <span>▼</span>`;
                
                const content = document.createElement('div');
                content.className = 'accordion-content';
                content.innerHTML = `<div class="content-text">${topic.content}</div>`;

                header.onclick = () => {
                    header.classList.toggle('active');
                    content.classList.toggle('open');
                    if(content.classList.contains('open')) {
                        content.style.maxHeight = content.scrollHeight + "px";
                        header.querySelector('span').innerText = '▲';
                    } else {
                        content.style.maxHeight = null;
                        header.querySelector('span').innerText = '▼';
                    }
                };

                item.appendChild(header);
                item.appendChild(content);
                body.appendChild(item);
            });

            openModal('modalModule');
        }

        // 5. Abrir Dashboard de Hormônios (Integrado no Módulo Digestivo)
        function openHormoneDashboard() {
            openModal('modalHormoneDashboard');
        }

        // 6. Abrir Detalhe do Hormônio
        function openHormoneDetail(h) {
            document.getElementById('hormoneDetailTitle').innerText = h.nome;
            document.getElementById('hormoneDetailBody').innerHTML = `
                <div class="content-text">
                    <div style="background:#f0f7ff; padding:15px; border-radius:8px; margin-bottom:15px;">

                    </div>
                    <p><strong>Produção:</strong> ${h.producao}</p>

                    <div style="margin-top:15px; padding:10px; border-left: 4px solid var(--danger-color); background: #fff5f5;">

            `;
            openModal('modalHormoneDetail');

    </script>
